name: YouTube Bot (Maya)

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # Strategy: MAXED OUT YT engagement + INDEPENDENT YT Shorts publishing
    # YouTube publishing is decoupled from Instagram — works even if IG is disabled
    # Each session has 0-4min startup jitter built into the code
    #
    # PARALLEL: Instagram engagement runs on a SEPARATE workflow (instagram-bot.yml)
    # so YT and IG never block each other.
    #
    # ~26 YT sessions/day — 06:00 to 23:45 IST, every ~45 min
    # Alternates yt_engage (niche browsing) and yt_replies (respond to comments)
    # 3 publish windows for 2-3 Shorts/day (research: 3.2x faster sub growth)
    - cron: '30 0 * * *'   # 06:00 IST — yt_engage (early morning)
    - cron: '15 1 * * *'   # 06:45 IST — yt_replies
    - cron: '0 2 * * *'    # 07:30 IST — yt_engage
    - cron: '45 2 * * *'   # 08:15 IST — yt_replies
    - cron: '30 3 * * *'   # 09:00 IST — yt_engage
    - cron: '15 4 * * *'   # 09:45 IST — yt_replies
    - cron: '0 5 * * *'    # 10:30 IST — yt_engage
    - cron: '45 5 * * *'   # 11:15 IST — yt_replies
    - cron: '30 6 * * *'   # 12:00 IST — yt_engage (lunch)
    - cron: '15 7 * * *'   # 12:45 IST — YT PUBLISH + yt_replies (lunch publish)
    - cron: '0 8 * * *'    # 13:30 IST — yt_engage
    - cron: '45 8 * * *'   # 14:15 IST — yt_replies
    - cron: '30 9 * * *'   # 15:00 IST — YT PUBLISH + yt_engage (afternoon publish)
    - cron: '15 10 * * *'  # 15:45 IST — yt_replies
    - cron: '0 11 * * *'   # 16:30 IST — yt_engage
    - cron: '45 11 * * *'  # 17:15 IST — yt_replies
    - cron: '30 12 * * *'  # 18:00 IST — yt_engage (pre-prime)
    - cron: '15 13 * * *'  # 18:45 IST — yt_replies
    - cron: '0 14 * * *'   # 19:30 IST — YT PUBLISH + yt_engage (prime time publish)
    - cron: '45 14 * * *'  # 20:15 IST — yt_replies
    - cron: '30 15 * * *'  # 21:00 IST — yt_engage (evening binge)
    - cron: '15 16 * * *'  # 21:45 IST — yt_replies
    - cron: '0 17 * * *'   # 22:30 IST — yt_engage
    - cron: '15 18 * * *'  # 23:45 IST — yt_replies (last pass)

  workflow_dispatch:
    inputs:
      session:
        description: 'YouTube session type'
        required: true
        default: 'yt_engage'
        type: choice
        options: [yt_engage, yt_replies, yt_full]
      publish:
        description: 'Also publish a YouTube Short?'
        type: boolean
        default: false

# YT sessions queue behind each other — INDEPENDENT from Instagram workflow
concurrency:
  group: youtube-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create .env from the DOTENV secret (includes PERSONA=maya)
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV }}" > instagram_influencer/.env
          grep -q "^PERSONA=" instagram_influencer/.env || echo "PERSONA=maya" >> instagram_influencer/.env
          echo "PERSONA=maya" >> $GITHUB_ENV

      # Determine which YT session to run based on the trigger
      # Uses github.event.schedule (exact cron expression) instead of wall-clock time
      # to avoid misrouting due to GitHub Actions cron delays (can be 10-20+ min)
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "yt_publish=true" >> $GITHUB_OUTPUT
            else
              echo "yt_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            CRON="${{ github.event.schedule }}"
            YT_PUB="false"
            case "${CRON}" in
              "30 0 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 1 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "0 2 * * *")   echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "45 2 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 3 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 4 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "0 5 * * *")   echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "45 5 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 6 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 7 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # lunch publish
              "0 8 * * *")   echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "45 8 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 9 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # afternoon publish
              "15 10 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "0 11 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "45 11 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 12 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 13 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "0 14 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # prime time publish
              "45 14 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 15 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 16 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "0 17 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "15 18 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              *)             echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
            esac
            echo "yt_publish=${YT_PUB}" >> $GITHUB_OUTPUT
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "YT Publish: ${{ steps.session.outputs.yt_publish }}"
          echo "Trigger: ${{ github.event_name }}"

      # Run YouTube engagement + optional YT-only publish
      - name: Run YouTube bot
        id: bot
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.yt_publish }}" = "true" ]; then
            FLAGS="$FLAGS --yt-publish-only"
          else
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::YouTube bot run failed — check logs above"

      # Commit updated state files back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            instagram_influencer/data/maya/engagement_log.json \
            instagram_influencer/data/maya/content_queue.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || (
            git commit -m "bot: maya yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 2
            done
          )
