name: YouTube Bot (Maya)

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # 12 YT sessions/day — 07:00 to 23:00 IST, every ~90 min
    # Maya has her own Google Cloud project (solo 10k quota/day)
    #
    # Quota budget (10k units/day — solo):
    #   2 uploads × 1,650 = 3,300 units
    #   12 engagement sessions × ~300 = 3,600 units
    #   Total: ~6,900 units ✓
    - cron: '30 1 * * *'   # 07:00 IST — yt_engage (morning)
    - cron: '0 3 * * *'    # 08:30 IST — yt_replies
    - cron: '30 4 * * *'   # 10:00 IST — yt_engage
    - cron: '0 6 * * *'    # 11:30 IST — yt_replies
    - cron: '30 7 * * *'   # 13:00 IST — YT PUBLISH + yt_engage (lunch)
    - cron: '0 9 * * *'    # 14:30 IST — yt_replies
    - cron: '30 10 * * *'  # 16:00 IST — yt_engage
    - cron: '0 12 * * *'   # 17:30 IST — yt_replies
    - cron: '30 13 * * *'  # 19:00 IST — YT PUBLISH + yt_engage (prime time)
    - cron: '0 15 * * *'   # 20:30 IST — yt_replies
    - cron: '30 16 * * *'  # 22:00 IST — yt_engage (evening)
    - cron: '0 17 * * *'   # 22:30 IST — yt_replies (last pass)

  workflow_dispatch:
    inputs:
      session:
        description: 'YouTube session type'
        required: true
        default: 'yt_engage'
        type: choice
        options: [yt_engage, yt_replies, yt_full]
      publish:
        description: 'Also publish a YouTube Short?'
        type: boolean
        default: false

# YT sessions queue behind each other — INDEPENDENT from Instagram workflow
concurrency:
  group: youtube-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create .env from the DOTENV secret (includes PERSONA=maya)
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV }}" > instagram_influencer/.env
          grep -q "^PERSONA=" instagram_influencer/.env || echo "PERSONA=maya" >> instagram_influencer/.env
          echo "PERSONA=maya" >> $GITHUB_ENV

      # Route traffic through VPN proxy (anti-detection: avoids datacenter IPs)
      - name: Setup proxy
        id: proxy
        if: ${{ secrets.WG_CONFIG_MAYA != '' }}
        uses: ./.github/actions/setup-proxy
        with:
          wireguard_config: ${{ secrets.WG_CONFIG_MAYA }}
          proxy_port: '10801'

      - name: Inject proxy URL
        if: steps.proxy.outputs.proxy_url != ''
        run: |
          echo "PROXY_URL=${{ steps.proxy.outputs.proxy_url }}" >> instagram_influencer/.env
          echo "Proxy enabled: ${{ steps.proxy.outputs.proxy_url }}"

      # Determine which YT session to run based on the trigger
      # Uses github.event.schedule (exact cron expression) instead of wall-clock time
      # to avoid misrouting due to GitHub Actions cron delays (can be 10-20+ min)
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "yt_publish=true" >> $GITHUB_OUTPUT
            else
              echo "yt_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            CRON="${{ github.event.schedule }}"
            YT_PUB="false"
            case "${CRON}" in
              "30 1 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 3 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 4 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 6 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 7 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # lunch publish
              "0 9 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 10 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 12 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 13 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # prime time publish
              "0 15 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 16 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 17 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              *)             echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
            esac
            echo "yt_publish=${YT_PUB}" >> $GITHUB_OUTPUT
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "YT Publish: ${{ steps.session.outputs.yt_publish }}"
          echo "Trigger: ${{ github.event_name }}"

      # Run YouTube engagement + optional YT-only publish
      - name: Run YouTube bot
        id: bot
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.yt_publish }}" = "true" ]; then
            FLAGS="$FLAGS --yt-publish-only"
          else
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::YouTube bot run failed — check logs above"

      # Commit updated state files back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            instagram_influencer/data/maya/engagement_log.json \
            instagram_influencer/data/maya/content_queue.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || (
            git commit -m "bot: maya yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3 4 5; do
              if git pull --rebase origin main; then
                git push && break
              else
                echo "Rebase conflict on attempt $attempt — resetting and re-staging"
                git rebase --abort 2>/dev/null || true
                git reset --soft HEAD~1
                git stash
                git pull origin main
                git stash pop || true
                git add -A
                git commit -m "bot: maya yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
              fi
              sleep $((attempt * 2))
            done
          )
