name: YouTube Bot - Aryan

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # 8 YT sessions/day — 07:00 to 21:30 IST, every ~2h
    # INTERLEAVED with Rhea (shared Google Cloud project, 10k units/day total)
    # Aryan runs on even-ish hours, Rhea on odd-ish hours
    #
    # Quota budget (10k shared with Rhea):
    #   Aryan: 1 upload × 1,650 = 1,650 + 8 sessions × ~300 = 2,400 = ~4,050 units
    #   Rhea:  1 upload × 1,650 = 1,650 + 8 sessions × ~300 = 2,400 = ~4,050 units
    #   Total: ~8,100 units ✓
    - cron: '30 1 * * *'   # 07:00 IST — yt_engage (morning)
    - cron: '30 3 * * *'   # 09:00 IST — yt_replies
    - cron: '30 5 * * *'   # 11:00 IST — yt_engage
    - cron: '30 7 * * *'   # 13:00 IST — YT PUBLISH + yt_replies (lunch)
    - cron: '30 9 * * *'   # 15:00 IST — yt_engage
    - cron: '30 11 * * *'  # 17:00 IST — yt_replies
    - cron: '15 14 * * *'  # 19:45 IST — YT PUBLISH + yt_engage (prime time)
    - cron: '0 16 * * *'   # 21:30 IST — yt_replies (last pass)

  workflow_dispatch:
    inputs:
      session:
        description: 'YouTube session type'
        required: true
        default: 'yt_engage'
        type: choice
        options: [yt_engage, yt_replies, yt_full]
      publish:
        description: 'Also publish a YouTube Short?'
        type: boolean
        default: false

# YT sessions queue behind each other — INDEPENDENT from Instagram workflow
concurrency:
  group: youtube-bot-aryan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create .env from the DOTENV_ARYAN secret (needed for YouTube API keys)
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV_ARYAN }}" > instagram_influencer/.env
          sed -i '/^PERSONA=/d' instagram_influencer/.env
          echo "PERSONA=aryan" >> instagram_influencer/.env
          echo "PERSONA=aryan" >> $GITHUB_ENV

      # Determine which YT session to run based on the trigger
      # Uses github.event.schedule (exact cron expression) instead of wall-clock time
      # to avoid misrouting due to GitHub Actions cron delays (can be 10-20+ min)
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "yt_publish=true" >> $GITHUB_OUTPUT
            else
              echo "yt_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            CRON="${{ github.event.schedule }}"
            YT_PUB="false"
            case "${CRON}" in
              "30 1 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 3 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 5 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 7 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # lunch publish
              "30 9 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 11 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 14 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # prime time publish
              "0 16 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              *)             echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
            esac
            echo "yt_publish=${YT_PUB}" >> $GITHUB_OUTPUT
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "YT Publish: ${{ steps.session.outputs.yt_publish }}"
          echo "Trigger: ${{ github.event_name }}"

      # Run YouTube engagement + optional YT-only publish
      - name: Run YouTube bot
        id: bot
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.yt_publish }}" = "true" ]; then
            FLAGS="$FLAGS --yt-publish-only"
          else
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::YouTube bot run failed — check logs above"

      # Commit updated state files back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            instagram_influencer/data/aryan/engagement_log.json \
            instagram_influencer/data/aryan/content_queue.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || (
            git commit -m "bot: aryan yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 2
            done
          )
