name: YouTube Bot - Aryan

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # Staggered +15 min from Maya's YT schedule to avoid overlap
    # ~23 YT sessions/day — 06:15 to 22:45 IST, every ~45 min
    # Alternates yt_engage (niche browsing) and yt_replies (respond to comments)
    # 2 publish windows (shared quota with Rhea — same Google Cloud project)
    #
    # IMPORTANT: Aryan + Rhea share 10k units/day. Each upload = 1,650 units.
    # Budget: ~2 uploads/persona/day + engagement.
    - cron: '45 0 * * *'   # 06:15 IST — yt_engage (early morning)
    - cron: '30 1 * * *'   # 07:00 IST — yt_replies
    - cron: '15 2 * * *'   # 07:45 IST — yt_engage
    - cron: '0 3 * * *'    # 08:30 IST — yt_replies
    - cron: '45 3 * * *'   # 09:15 IST — yt_engage
    - cron: '30 4 * * *'   # 10:00 IST — yt_replies
    - cron: '15 5 * * *'   # 10:45 IST — yt_engage
    - cron: '0 6 * * *'    # 11:30 IST — yt_replies
    - cron: '45 6 * * *'   # 12:15 IST — yt_engage (lunch)
    - cron: '30 7 * * *'   # 13:00 IST — YT PUBLISH + yt_replies (lunch publish)
    - cron: '15 8 * * *'   # 13:45 IST — yt_engage
    - cron: '0 9 * * *'    # 14:30 IST — yt_replies
    - cron: '45 9 * * *'   # 15:15 IST — yt_engage
    - cron: '30 10 * * *'  # 16:00 IST — yt_replies
    - cron: '15 11 * * *'  # 16:45 IST — yt_engage
    - cron: '0 12 * * *'   # 17:30 IST — yt_replies
    - cron: '45 12 * * *'  # 18:15 IST — yt_engage (pre-prime)
    - cron: '30 13 * * *'  # 19:00 IST — yt_replies
    - cron: '15 14 * * *'  # 19:45 IST — YT PUBLISH + yt_engage (prime time publish)
    - cron: '0 15 * * *'   # 20:30 IST — yt_replies
    - cron: '45 15 * * *'  # 21:15 IST — yt_engage (evening binge)
    - cron: '30 16 * * *'  # 22:00 IST — yt_replies
    - cron: '15 17 * * *'  # 22:45 IST — yt_engage (last pass)

  workflow_dispatch:
    inputs:
      session:
        description: 'YouTube session type'
        required: true
        default: 'yt_engage'
        type: choice
        options: [yt_engage, yt_replies, yt_full]
      publish:
        description: 'Also publish a YouTube Short?'
        type: boolean
        default: false

# YT sessions queue behind each other — INDEPENDENT from Instagram workflow
concurrency:
  group: youtube-bot-aryan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create .env from the DOTENV_ARYAN secret (needed for YouTube API keys)
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV_ARYAN }}" > instagram_influencer/.env
          grep -q "^PERSONA=" instagram_influencer/.env || echo "PERSONA=aryan" >> instagram_influencer/.env
          echo "PERSONA=aryan" >> $GITHUB_ENV

      # Determine which YT session to run based on the trigger
      # Uses github.event.schedule (exact cron expression) instead of wall-clock time
      # to avoid misrouting due to GitHub Actions cron delays (can be 10-20+ min)
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "yt_publish=true" >> $GITHUB_OUTPUT
            else
              echo "yt_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            CRON="${{ github.event.schedule }}"
            YT_PUB="false"
            case "${CRON}" in
              "45 0 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 1 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 2 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 3 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "45 3 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 4 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 5 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 6 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "45 6 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 7 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # lunch publish
              "15 8 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 9 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "45 9 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 10 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 11 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 12 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "45 12 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 13 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 14 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # prime time publish
              "0 15 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "45 15 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 16 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "15 17 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              *)             echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
            esac
            echo "yt_publish=${YT_PUB}" >> $GITHUB_OUTPUT
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "YT Publish: ${{ steps.session.outputs.yt_publish }}"
          echo "Trigger: ${{ github.event_name }}"

      # Run YouTube engagement + optional YT-only publish
      - name: Run YouTube bot
        id: bot
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.yt_publish }}" = "true" ]; then
            FLAGS="$FLAGS --yt-publish-only"
          else
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::YouTube bot run failed — check logs above"

      # Commit updated state files back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            instagram_influencer/data/aryan/engagement_log.json \
            instagram_influencer/data/aryan/content_queue.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || (
            git commit -m "bot: aryan yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 2
            done
          )
