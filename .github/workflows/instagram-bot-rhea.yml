name: Instagram Bot (Rhea)

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # Strategy: human-like phone-check pattern — fewer sessions, longer gaps
    # Rhea "wakes" at ~5:30 IST (early riser fitness). Staggered +53min from Maya's times.
    #
    # NO OVERNIGHT sessions — real people sleep.
    #
    # DAYTIME — 20 IG sessions, 05:30 to 21:53 IST, every 50-70 min
    - cron: '0 0 * * *'    # 05:30 IST — morning (wake up)
    - cron: '55 0 * * *'   # 06:25 IST — explore (morning scroll)
    - cron: '53 1 * * *'   # 07:23 IST — hashtags
    - cron: '43 2 * * *'   # 08:13 IST — commenter_target
    - cron: '33 3 * * *'   # 09:03 IST — warm_audience
    - cron: '23 4 * * *'   # 09:53 IST — hashtags
    - cron: '23 5 * * *'   # 10:53 IST — replies
    - cron: '23 6 * * *'   # 11:53 IST — warm_audience
    - cron: '13 7 * * *'   # 12:43 IST — BACKUP PUBLISH + explore (lunch)
    - cron: '3 8 * * *'    # 13:33 IST — warm_audience
    - cron: '53 8 * * *'   # 14:23 IST — hashtags
    - cron: '53 9 * * *'   # 15:23 IST — stories
    - cron: '43 10 * * *'  # 16:13 IST — explore
    - cron: '33 11 * * *'  # 17:03 IST — commenter_target
    - cron: '33 12 * * *'  # 18:03 IST — PUBLISH (prime time)
    - cron: '23 13 * * *'  # 18:53 IST — hashtags (post-publish boost)
    - cron: '33 13 * * *'  # 19:03 IST — boost (viral detection)
    - cron: '33 14 * * *'  # 20:03 IST — cross_promo
    - cron: '33 15 * * *'  # 21:03 IST — maintenance
    - cron: '23 16 * * *'  # 21:53 IST — report

  workflow_dispatch:
    inputs:
      session:
        description: 'Session type'
        required: true
        default: 'full'
        type: choice
        options: [morning, replies, hashtags, explore, warm_audience, commenter_target, boost, maintenance, stories, cross_promo, report, full]
      publish:
        description: 'Also publish a post?'
        type: boolean
        default: false

# Only one bot run at a time (queue others, don't cancel)
concurrency:
  group: instagram-bot-rhea
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore Instagram session from cache (avoids re-login each run)
      - name: Restore session cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: instagram_influencer/data/rhea/.ig_session.json
          key: ig-session-rhea
          restore-keys: ig-session-rhea

      # Seed session from secret if no cache was restored
      - name: Seed session from secret
        run: |
          mkdir -p instagram_influencer/data/rhea
          if [ -n "$CACHE_KEY" ]; then
            echo "Session restored from cache ($CACHE_KEY)"
          elif [ -n "$SESS_B64" ]; then
            echo "$SESS_B64" | base64 -d > instagram_influencer/data/rhea/.ig_session.json
            echo "Seeded session from secret (overwrote repo version)"
          elif [ -f instagram_influencer/data/rhea/.ig_session.json ]; then
            echo "Using session from repo checkout (no cache, no secret)"
          else
            echo "WARNING: No session available — bot will attempt fresh login"
          fi
        env:
          SESS_B64: ${{ secrets.INSTAGRAM_SESSION_B64_RHEA }}
          CACHE_KEY: ${{ steps.cache.outputs.cache-matched-key }}

      # Create .env from the DOTENV_RHEA secret
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV_RHEA }}" > instagram_influencer/.env
          grep -q "^PERSONA=" instagram_influencer/.env || echo "PERSONA=rhea" >> instagram_influencer/.env
          # Also export PERSONA to the environment for reliability
          echo "PERSONA=rhea" >> $GITHUB_ENV

      # Determine which session to run based on the trigger
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "publish=true" >> $GITHUB_OUTPUT
            else
              echo "publish=false" >> $GITHUB_OUTPUT
            fi
          else
            # Scheduled run — map exact cron expression to session type
            CRON="${{ github.event.schedule }}"
            case "${CRON}" in
              "0 0 * * *")    echo "type=morning"          >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "55 0 * * *")   echo "type=explore"          >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "53 1 * * *")   echo "type=hashtags"         >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "43 2 * * *")   echo "type=commenter_target" >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 3 * * *")   echo "type=warm_audience"    >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "23 4 * * *")   echo "type=hashtags"         >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "23 5 * * *")   echo "type=replies"          >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "23 6 * * *")   echo "type=warm_audience"    >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "13 7 * * *")   echo "type=explore"          >> $GITHUB_OUTPUT; echo "publish=true"  >> $GITHUB_OUTPUT ;;  # backup publish
              "3 8 * * *")    echo "type=warm_audience"    >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "53 8 * * *")   echo "type=hashtags"         >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "53 9 * * *")   echo "type=stories"          >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "43 10 * * *")  echo "type=explore"          >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 11 * * *")  echo "type=commenter_target" >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 12 * * *")  echo "type=explore"          >> $GITHUB_OUTPUT; echo "publish=true"  >> $GITHUB_OUTPUT ;;  # prime publish
              "23 13 * * *")  echo "type=hashtags"         >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 13 * * *")  echo "type=boost"            >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 14 * * *")  echo "type=cross_promo"      >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "33 15 * * *")  echo "type=maintenance"      >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              "23 16 * * *")  echo "type=report"           >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
              *)              echo "type=hashtags"         >> $GITHUB_OUTPUT; echo "publish=false" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "Publish: ${{ steps.session.outputs.publish }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Persona: rhea"

      # Random skip — 20% of non-critical sessions get skipped for human-like irregularity
      - name: Random session skip
        id: skip
        run: |
          SESSION="${{ steps.session.outputs.type }}"
          PUBLISH="${{ steps.session.outputs.publish }}"
          # Never skip: publish, report, maintenance, boost, or manual runs
          if [ "$PUBLISH" = "true" ] || [ "$SESSION" = "report" ] || [ "$SESSION" = "maintenance" ] || [ "$SESSION" = "boost" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            # 20% chance of skipping
            ROLL=$((RANDOM % 100))
            if [ "$ROLL" -lt 20 ]; then
              echo "Randomly skipping session (roll=$ROLL < 20) — human-like irregularity"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      # Videos are pre-rendered locally/manually — always pass --no-generate
      - name: Run bot
        id: bot
        if: steps.skip.outputs.skip != 'true'
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.publish }}" = "false" ]; then
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::Bot run failed — check logs above"

      # Save updated session to cache
      - name: Save session cache
        if: steps.bot.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: instagram_influencer/data/rhea/.ig_session.json
          key: ig-session-rhea-${{ github.run_id }}

      # Commit updated state files + session back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each file individually to avoid one missing file blocking all staging
          for f in \
            instagram_influencer/data/rhea/engagement_log.json \
            instagram_influencer/data/rhea/followers.json \
            instagram_influencer/data/rhea/content_queue.json \
            instagram_influencer/data/rhea/highlights.json \
            instagram_influencer/data/rhea/trending_hashtags_cache.json \
            instagram_influencer/data/rhea/daily_report.md \
            instagram_influencer/data/rhea/.ig_session.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          # Generated images (directory may not exist)
          [ -f "instagram_influencer/data/rhea/generated_images/IMAGE_PROMPTS.md" ] && \
            git add -f "instagram_influencer/data/rhea/generated_images/IMAGE_PROMPTS.md" 2>/dev/null || true
          [ -d "instagram_influencer/data/rhea/generated_images/pending" ] && \
            git add -f "instagram_influencer/data/rhea/generated_images/pending/" 2>/dev/null || true
          echo "Staged files:"
          git diff --staged --name-only || true
          git diff --staged --quiet || (
            git commit -m "bot: rhea state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 2
            done
          )
