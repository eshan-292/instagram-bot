name: YouTube Bot - Rhea

on:
  schedule:
    # All cron times in UTC. IST = UTC + 5:30
    # 8 YT sessions/day — 08:00 to 22:00 IST, every ~2h
    # INTERLEAVED with Aryan (shared Google Cloud project, 10k units/day total)
    # Rhea runs on odd-ish hours, offset ~1h from Aryan
    #
    # Quota budget (10k shared with Aryan):
    #   Aryan: 1 upload × 1,650 + 8 sessions × ~300 = ~4,050 units
    #   Rhea:  1 upload × 1,650 + 8 sessions × ~300 = ~4,050 units
    #   Total: ~8,100 units ✓
    - cron: '30 2 * * *'   # 08:00 IST — yt_engage (morning)
    - cron: '30 4 * * *'   # 10:00 IST — yt_replies
    - cron: '30 6 * * *'   # 12:00 IST — yt_engage
    - cron: '0 8 * * *'    # 13:30 IST — YT PUBLISH + yt_replies (lunch)
    - cron: '0 10 * * *'   # 15:30 IST — yt_engage
    - cron: '0 12 * * *'   # 17:30 IST — yt_replies
    - cron: '30 14 * * *'  # 20:00 IST — YT PUBLISH + yt_engage (prime time)
    - cron: '30 16 * * *'  # 22:00 IST — yt_replies (last pass)

  workflow_dispatch:
    inputs:
      session:
        description: 'YouTube session type'
        required: true
        default: 'yt_engage'
        type: choice
        options: [yt_engage, yt_replies, yt_full]
      publish:
        description: 'Also publish a YouTube Short?'
        type: boolean
        default: false

# YT sessions queue behind each other — INDEPENDENT from Instagram workflow
concurrency:
  group: youtube-bot-rhea
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create .env from the DOTENV_RHEA secret (needed for YouTube API keys)
      - name: Create .env
        run: |
          echo "${{ secrets.DOTENV_RHEA }}" > instagram_influencer/.env
          grep -q "^PERSONA=" instagram_influencer/.env || echo "PERSONA=rhea" >> instagram_influencer/.env
          echo "PERSONA=rhea" >> $GITHUB_ENV

      # Determine which YT session to run based on the trigger
      # Uses github.event.schedule (exact cron expression) instead of wall-clock time
      # to avoid misrouting due to GitHub Actions cron delays (can be 10-20+ min)
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.session }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.publish }}" = "true" ]; then
              echo "yt_publish=true" >> $GITHUB_OUTPUT
            else
              echo "yt_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            CRON="${{ github.event.schedule }}"
            YT_PUB="false"
            case "${CRON}" in
              "30 2 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "30 4 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 6 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 8 * * *")   echo "type=yt_replies"  >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # lunch publish
              "0 10 * * *")  echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
              "0 12 * * *")  echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              "30 14 * * *") echo "type=yt_engage"   >> $GITHUB_OUTPUT; YT_PUB="true" ;;  # prime time publish
              "30 16 * * *") echo "type=yt_replies"  >> $GITHUB_OUTPUT ;;
              *)             echo "type=yt_engage"   >> $GITHUB_OUTPUT ;;
            esac
            echo "yt_publish=${YT_PUB}" >> $GITHUB_OUTPUT
          fi

      - name: Show session info
        run: |
          echo "Session: ${{ steps.session.outputs.type }}"
          echo "YT Publish: ${{ steps.session.outputs.yt_publish }}"
          echo "Trigger: ${{ github.event_name }}"

      # Run YouTube engagement + optional YT-only publish
      - name: Run YouTube bot
        id: bot
        continue-on-error: true
        run: |
          cd instagram_influencer
          FLAGS="--session ${{ steps.session.outputs.type }} --no-generate"
          if [ "${{ steps.session.outputs.yt_publish }}" = "true" ]; then
            FLAGS="$FLAGS --yt-publish-only"
          else
            FLAGS="$FLAGS --no-publish"
          fi
          echo "Running: python orchestrator.py $FLAGS"
          python orchestrator.py $FLAGS

      - name: Check bot result
        if: steps.bot.outcome == 'failure'
        run: echo "::warning::YouTube bot run failed — check logs above"

      # Commit updated state files back to the repo
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in \
            instagram_influencer/data/rhea/engagement_log.json \
            instagram_influencer/data/rhea/content_queue.json; do
            [ -f "$f" ] && git add -f "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || (
            git commit -m "bot: rhea yt state update $(date -u +%Y-%m-%dT%H:%M:%SZ) [${{ steps.session.outputs.type }}]"
            for attempt in 1 2 3; do
              git pull --rebase origin main 2>/dev/null && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 2
            done
          )
